name: loglens

# Production stack for a single VM (Oracle Cloud Always Free, etc.)
# Infra binds to 127.0.0.1 only — not exposed to the public internet.
# Go binaries (api, ingestor, consumer) run on the host via systemd.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: loglens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
      POSTGRES_DB: loglens
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loglens -d loglens"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 768M
      - --overprovisioned
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      # Host-side Go apps connect via localhost port mapping.
      - --advertise-kafka-addr
      - PLAINTEXT://127.0.0.1:9092
      - --set
      - redpanda.log_retention_ms=21600000
    ports:
      - "127.0.0.1:9092:9092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
